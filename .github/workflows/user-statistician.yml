# This workflow configures the user-statistician with the
# dark-dimmed color theme, but otherwise uses all of
# the defaults. It is configured on a weekly schedule at 3am.

name: User Statistician

permissions:
  contents: write

on:
  # schedule:
  #   - cron: "0 3 * * 0"
  # push:
  #   branches: [main, master]
  #   paths: [".github/workflows/user-statistician.yml"]
  # pull_request:
  #   branches: [main, master]
  #   paths: [".github/workflows/user-statistician.yml"]
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate User Stats Image
        uses: cicirello/user-statistician@c264af153092bf60143f85e7683739898a274b94 # v1.26.2
        with:
          colors: dark
          fail-on-error: false
        env:
          GITHUB_TOKEN: ${{secrets.PAT_TOKEN}}
