# This workflow generates GitHub stats metrics using lowlighter/metrics.
# Configured to match the same stats as user-statistician. Runs daily at 3am.

name: Metrics

permissions:
  contents: write

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main, master]
    paths: [".github/workflows/metrics.yml"]
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          config_timezone: America/Los_Angeles
          config_display: large
          config_output: svg
          filename: images/userstats.svg
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          repositories_forks: yes
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 365
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_stargazers: yes
          plugin_stargazers_charts_type: classic