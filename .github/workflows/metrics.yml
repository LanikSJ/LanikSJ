# This workflow generates GitHub language stats using lowlighter/metrics.
# Runs daily at 3am.

name: Metrics

permissions:
  contents: write

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main, master]
    paths: [".github/workflows/metrics.yml"]
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          config_timezone: America/Los_Angeles
          filename: images/userstats.svg
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage